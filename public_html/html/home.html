<!DOCTYPE html>
<html>

<head>
    <title>Test Sheets</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/public_html/manifest.json">

    <link rel="stylesheet" href="../stylesheets/root.css">
    <link rel="stylesheet" href="../stylesheets/home.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="apple-touch-icon" sizes="180x180" href="/public_html/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/public_html/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/public_html/icons/favicon-16x16.png">
</head>

<body>
    <div id="mainContainer">
        <div class="topbar">
            <span class="topbarSpacer"></span>
            <h1>Test Sheets</h1>
            <span class="topbarButtonSection">
                <span id="topbarAccountLogOutHolder">
                    <button id="signOutButton">Sign Out<span class="material-symbols-outlined">logout</span></button>
                    <button id="userSettingsButton" style="display: none;"><span
                            class="material-symbols-outlined">settings</span></button>
                </span>
                <span id="networkSyncIndicator">
                    <p id="networkSyncIndicatorIcon" class="material-symbols-outlined">globe_2_cancel</p>
                    <p id="networkSyncIndicatorText">Syncing</p>
                    <button id="networkSyncIndicatorButton">Fix</button>
                </span>
            </span>
        </div>
        <div id="sortBar">
            <label>Order By: <select id="sortSelect">
                    <option value="modified-at">Modified Date</option>
                    <option value="created-at">Created Date</option>
                    <option value="course">Course</option>
                </select></label>
        </div>
        <div id="homeContentSection">
            <div id="homeMainListCentered">
                <div id="homeMainList">
                </div>
            </div>
        </div>
        <div id="offlineWarningBottomBar">Displaying offline sheets only. Reconnect to see all sheets.</div>
    </div>
    <template id="cardTemplate">
        <div class="card">
            <button class="cloudStatusButton material-symbols-outlined"
                title="Preload for offline use">cloud_upload</button>
            <label class="cardTitleText"></label>
            <p class="cardTitleDescriptor"></p>
            <input class="cardLabelInput" placeholder="Label">
            <div class="cardInfoRow"><span class="material-symbols-outlined" title="Candidate Count">people</span>
                <p class="cardInfoCandidates">?</p>
            </div>
            <div class="cardInfoRow"><span class="material-symbols-outlined" title="Modified At">schedule</span>
                <p class="cardInfoModifiedAt">?</p>
            </div>
            <div class="cardButtonHolder skeleton-exempt">
                <button class="cardButton cardView"><span class="material-symbols-outlined">visibility</span>
                    <p>View Sheet</p>
                </button>
                <button class="cardButton cardToolkit"><span
                        class="material-symbols-outlined">home_repair_service</span>
                    <p>Exam Toolkit</p>
                </button>
                <button class="cardButton cardDelete"><span class="material-symbols-outlined">delete</span>
                    <p>Delete</p>
                </button>
            </div>
        </div>
    </template>
    <template id="newSheetCardTemplate">
        <div class="card newSheetCard">
            <label class="cardTitleText">New</label>
            <p class="cardTitleDescriptor">Create a New Sheet</p>
            <button onclick="redirectToCreate()" class="cardNewSheetButton">+</button>
            <p class="cardMaxSavesWarning">Maximum number of saves reached. You will not be able to save more sheets.
            </p>
        </div>
    </template>
    <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.9.0/firebase-functions-compat.js"></script>
    <script src="../javascript/utility/ServerTimeService.js"></script>
    <script src="../javascript/utility/ResponseContainer.js"></script>
    <script src="../javascript/utility/ToolkitContainer.js"></script>
    <script src="../javascript/utility/ToolkitMappingInterpreter.js"></script>
    <script src="../javascript/utility/utility.js"></script>
    <script src="../javascript/utility/ConnectionManager.js"></script>
    <script src="../javascript/utility/DataManager.js"></script>
    <script src="../javascript/home.js"></script>
</body>

</html>
